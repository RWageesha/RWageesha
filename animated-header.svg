<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #00F7FF; stop-opacity: 1" />
      <stop offset="100%" style="stop-color: #8A2BE2; stop-opacity: 1" />
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#gradient)">
    <animate attributeName="x" from="-800" to="800" dur="5s" repeatCount="indefinite" />
  </rect>
  <text x="50%" y="50%" font-size="32" font-family="Arial, sans-serif" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">
    Wageesha | Full-Stack & AI/ML
    <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" />
  </text>
</svg>